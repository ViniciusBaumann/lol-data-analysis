version: "3.9"

# =============================================================================
# Datanalys - Production Docker Compose
# Deploy: VPS Hostinger Ubuntu 22.04 LTS
# Access: http://<VPS_IP> (frontend) | http://<VPS_IP>/api (backend)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: datanalys_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-datanalys}
      POSTGRES_USER: ${DB_USER:-datanalys}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-datanalys} -d ${DB_NAME:-datanalys}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - datanalys_network

  # ---------------------------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: datanalys_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datanalys_network

  # ---------------------------------------------------------------------------
  # Django Backend API
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: datanalys_backend
    restart: always
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
      - ./backend/data:/app/data
      # ml_models are baked into the Docker image
    networks:
      - datanalys_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # React Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL:-/api/v1/analytics}
    container_name: datanalys_frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - datanalys_network

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: datanalys_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - backend_static:/var/www/static:ro
      - backend_media:/var/www/media:ro
    depends_on:
      - frontend
      - backend
    networks:
      - datanalys_network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_static:
    driver: local
  backend_media:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  datanalys_network:
    driver: bridge
